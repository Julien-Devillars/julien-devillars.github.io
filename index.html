<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Julien Devillars</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0d0d1a;
      color: #f0eeff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
    }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: 0.5px; }
    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 28px 32px;
      width: 260px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    .card-icon { font-size: 2.2rem; }
    .card-title { font-size: 1.1rem; font-weight: 600; }
    .card-desc { font-size: 0.85rem; color: #a89fc0; }
  </style>
</head>
<body>
  <h1>Julien Devillars</h1>
  <div class="cards">
    <a class="card" href="/intense-marketing/">
      <div class="card-icon">🎯</div>
      <div class="card-title">Intense Marketing</div>
      <div class="card-desc">Kit animateur &amp; jeu de déduction Epic Events</div>
    </a>
    <a class="card" href="/birthday/">
      <div class="card-icon">🎂</div>
      <div class="card-title">Birthday Escape</div>
      <div class="card-desc">Solve each video clue to unlock the next one</div>
    </a>
  </div>
</body>
</html>
