<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epic Events — Entrez votre code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Particules de fond */
    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: min(420px, 92vw);
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(130, 80, 255, 0.15);
    }

    .logo {
      font-size: 2.8rem;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #e0d0ff;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 36px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.4rem;
      text-align: center;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #8250ff;
      box-shadow: 0 0 0 4px rgba(130,80,255,0.2);
    }

    input.error {
      border-color: #ff4d6d;
      box-shadow: 0 0 0 4px rgba(255,77,109,0.2);
      animation: shake 0.35s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #8250ff, #bf5fff);
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(130,80,255,0.4);
    }

    button:active { transform: translateY(0); }

    .error-msg {
      margin-top: 14px;
      font-size: 0.88rem;
      color: #ff4d6d;
      min-height: 1.2em;
      transition: opacity 0.2s;
    }

    .hint {
      margin-top: 28px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>

<canvas class="bg-stars" id="stars"></canvas>

<div class="card">
  <div class="logo">🎮</div>
  <h1>Epic Events</h1>
  <p class="subtitle">Entrez votre code pour rejoindre l'aventure</p>

  <div class="input-wrap">
    <input
      type="text"
      id="codeInput"
      maxlength="12"
      placeholder="XXXX"
      autocomplete="off"
      autofocus
    />
  </div>

  <button onclick="checkCode()">Entrer ›</button>
  <p class="error-msg" id="errMsg"></p>

  <p class="hint">Scannez un QR code ou tapez le code reçu</p>
</div>

<script>
  // ─── Table des codes → URL de destination ───────────────────────────
  const CODES = {
    "QUIZ1":   "quiz.html",
    "ENQUETE": "deduction.html",   // Jeu de déduction recrutement
    "PUZZLE":  "puzzle.html",
    "MEMORY":  "memory.html",
    "SNAKE":   "snake.html",
    // Ajouter autant de codes que nécessaire
  };

  // ─── Lecture du paramètre URL (pour les QR codes) ───────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const codeFromUrl = urlParams.get("code");
  if (codeFromUrl) {
    document.getElementById("codeInput").value = codeFromUrl.toUpperCase();
    checkCode();
  }

  function checkCode() {
    const input = document.getElementById("codeInput");
    const err   = document.getElementById("errMsg");
    const code  = input.value.trim().toUpperCase();

    err.textContent = "";
    input.classList.remove("error");

    if (!code) {
      showError(input, err, "Entrez un code.");
      return;
    }

    const dest = CODES[code];
    if (dest) {
      window.location.href = dest;
    } else {
      showError(input, err, "Code invalide. Réessayez !");
    }
  }

  function showError(input, err, msg) {
    err.textContent = msg;
    input.classList.add("error");
    setTimeout(() => input.classList.remove("error"), 400);
  }

  // Valider avec Entrée
  document.getElementById("codeInput").addEventListener("keydown", e => {
    if (e.key === "Enter") checkCode();
  });

  // ─── Étoiles animées ────────────────────────────────────────────────
  (function() {
    const canvas = document.getElementById("stars");
    const ctx    = canvas.getContext("2d");
    let stars    = [];
    const N      = 120;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      stars = Array.from({length: N}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.008,
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.15,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        s.x  = (s.x + s.vx + canvas.width)  % canvas.width;
        s.y  = (s.y + s.vy + canvas.height) % canvas.height;
        s.a  = Math.max(0.05, Math.min(1, s.a + s.da));
        if (s.a <= 0.05 || s.a >= 1) s.da = -s.da;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,150,255,${s.a})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", () => { resize(); });
    init();
    draw();
  })();
</script>
</body>
</html>
